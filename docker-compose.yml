version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sysgest_db
    restart: always
    environment:
      POSTGRES_USER: clinica_user
      POSTGRES_PASSWORD: clinica_password
      POSTGRES_DB: sysgest_db_demo
    ports:
      - "5433:5432"
    volumes:
      - sysgest_pgdata:/var/lib/postgresql/data
      # Mount initialization SQL scripts in the correct order
      - ./database/sql/002_create_enums.sql:/docker-entrypoint-initdb.d/001_create_enums.sql
      - ./database/sql/001_create_tables.sql:/docker-entrypoint-initdb.d/002_create_tables.sql
      - ./database/sql/003_add_relationships.sql:/docker-entrypoint-initdb.d/003_add_relationships.sql
      - ./database/sql/004_seed_data.sql:/docker-entrypoint-initdb.d/004_seed_data.sql

  backend:
    build: ./backend
    container_name: sysgest_backend
    restart: always
    ports:
      - "8001:8000"
    # To connect to the local DB directly, we use env_file.
    # We map host ports differently to prevent conflicts.
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: sysgest_frontend
    restart: always
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  landing:
    image: nginx:alpine
    container_name: sysgest_landing
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./landing_page:/usr/share/nginx/html:ro

volumes:
  sysgest_pgdata:
